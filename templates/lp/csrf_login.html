<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSRF Protected Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2 class="text-center">CSRF Protected Login</h2>
        <form method="POST" class="card">
            <input type="hidden" name="csrf_token" value="random_csrf_token_12345">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password">
            </div>
            <input type="submit" value="Login">
        </form>
        <div class="card mt-4">
            <p><small>This form contains a CSRF token. HTLogin will automatically detect and handle it.</small></p>
        </div>
        <a href="/lp" class="mt-4 card">Back to Login Examples</a>
    </div>
</body>
</html>
